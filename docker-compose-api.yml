version: "3"
services:
  # Spring Boot API 服务
  test-api:
    build: .
    container_name: selenium-test-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - GRID_URL=http://selenium-hub:4444/wd/hub
    depends_on:
      - selenium-hub
    networks:
      - selenium-grid
    volumes:
      - ./target/allure-results:/app/allure-results
      - ./screenshots:/app/screenshots
      - ./config:/app/config

  # Selenium Hub
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      - GRID_MAX_SESSION=10
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300
    networks:
      - selenium-grid

  # Chrome 节点
  chrome-node:
    image: selenium/node-chrome:4.18.1
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
    deploy:
      replicas: 2
    networks:
      - selenium-grid

  # Firefox 节点
  firefox-node:
    image: selenium/node-firefox:4.18.1
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
    deploy:
      replicas: 1
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge
